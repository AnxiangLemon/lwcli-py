<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LWAPI 运维台 — 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="login-page">
  <button type="button" class="login-theme-btn" onclick="toggleTheme()" title="切换浅色 / 深色" aria-label="切换主题">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="login-wrap">
    <div class="card login-card">
      <div class="login-brand">
        <div class="login-brand-icon" aria-hidden="true">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
          </svg>
        </div>
        <div>
          <div class="login-brand-title">LwApi <span class="login-accent">Admin</span></div>
          <span class="login-brand-sub">运维台登录</span>
        </div>
      </div>

      <form id="login-form" autocomplete="off">
        <label class="login-field-label" for="token">Token</label>
        <div class="login-input-wrap">
          <svg class="login-input-icon" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
          </svg>
          <input type="password" id="token" name="token" placeholder="请输入管理员 Token" required autofocus />
        </div>
        <p class="login-hint">
          <svg class="login-hint-icon" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          <span>连续多次错误可能被暂时禁止登录。</span>
        </p>
        <button type="submit" class="btn btn-primary login-submit" id="btn-submit">
           登 录
        </button>
        <div class="login-error" id="error" role="alert"></div>
      </form>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('theme-light');
      try {
        localStorage.setItem(
          'lwapi-theme',
          document.documentElement.classList.contains('theme-light') ? 'light' : 'dark'
        );
      } catch (e) {}
    }

    (function initTheme() {
      try {
        var t = localStorage.getItem('lwapi-theme');
        if (t === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();

    (async function init() {
      try {
        const st = await fetch('/api/auth/status', { credentials: 'same-origin' });
        const data = await st.json();
        if (!data.auth_enabled || data.authenticated) {
          const next = new URLSearchParams(location.search).get('next') || '/';
          location.replace(next);
        }
      } catch (e) {}
    })();

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('error');
      errEl.classList.remove('is-visible');
      btn.disabled = true;
      try {
        const token = document.getElementById('token').value;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ token: token }),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          errEl.textContent = data.error || ('登录失败 (' + res.status + ')');
          errEl.classList.add('is-visible');
          return;
        }
        const next = new URLSearchParams(location.search).get('next') || '/';
        location.replace(next);
      } catch (ex) {
        errEl.textContent = ex.message || '网络错误';
        errEl.classList.add('is-visible');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
