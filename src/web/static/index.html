            <button type="button" class="btn btn-ghost" onclick="clearMsgSearch()">清除关键词</button>
            <button type="button" class="btn" onclick="loadMessagesPanel(true)">刷新</button>
            <button type="button" class="btn btn-danger" onclick="confirmClearAllMessages()">清空全部消息</button>

        </div>

        <button type="button" class="msg-nav-item is-active" data-filter="all" onclick="selectMsgFilterAll()">全部消息</button>
            <p class="msg-nav-title">按类型</p>
            <div id="msg-nav-by-type" class="msg-nav-stack"></div>
            <p class="msg-nav-title">按会话</p>

          <div class="msg-inbox-main">
            <p class="msg-list-meta" id="msg-list-meta">共 0 条</p>
            <div class="msg-feed-stack">
              <div class="msg-table-wrap">

                    <tr>
                      <th>时间</th>
                      <th>机器人</th>
                      <th>会话</th>
                      <th>类型</th>
                      <th>内容</th>
                    </tr>
                  </thead>
                  <tbody id="msg-table-body"></tbody>
                </table>
              </div>
              <div id="msg-compose-panel" class="msg-compose-panel" hidden>

                  <div class="msg-compose-chips">
                    <span class="msg-chip" title="目标会话"><span class="msg-chip-k">会话</span><code id="msg-compose-peer"></code></span>

  <script>
    const accountWs = {};
const VIEW_TITLES = { accounts: '账号列表', messages: '消息聚合', logs: '日志', plugins: '插件管理' };

    function setMainTitle(name) {
      const el = document.getElementById('main-title');
      if (el) el.textContent = VIEW_TITLES[name] || '';
    }

    function toggleSidebar(force) {
      if (force === false) document.body.classList.remove('sidebar-open');
      else if (force === true) document.body.classList.add('sidebar-open');
      else document.body.classList.toggle('sidebar-open');
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('theme-light');
      try {
        localStorage.setItem('lwapi-theme', document.documentElement.classList.contains('theme-light') ? 'light' : 'dark');
      } catch (e) {}
    }

    (function initTheme() {
      try {
        var t = localStorage.getItem('lwapi-theme');
        if (t === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();

    var _lwSelectDocBound = false;

    function lwSelectCloseAll(exceptWrap) {
      document.querySelectorAll('.lw-select.is-open').forEach(function (w) {
        if (exceptWrap && w === exceptWrap) return;
        w.classList.remove('is-open');
        var t = w.querySelector('.lw-select-trigger');
        var p = w.querySelector('.lw-select-panel');
        if (t) t.setAttribute('aria-expanded', 'false');
        if (p) p.hidden = true;
      });
    }

    function refreshLwSelect(nativeSel) {
      if (!nativeSel || !nativeSel._lwSelectWrap) return;
      var wrap = nativeSel._lwSelectWrap;
      var labelEl = wrap.querySelector('.lw-select-label');
      var panel = wrap.querySelector('.lw-select-panel');
      if (!labelEl || !panel) return;
      var cur = nativeSel.value;
      panel.innerHTML = '';
      Array.prototype.forEach.call(nativeSel.options, function (opt) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'lw-select-option';
        btn.setAttribute('role', 'option');
        btn.dataset.value = opt.value;
        btn.textContent = opt.textContent;
        if (opt.value === cur) {
          btn.classList.add('is-selected');
          btn.setAttribute('aria-selected', 'true');
        } else {
          btn.setAttribute('aria-selected', 'false');
        }
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          nativeSel.value = opt.value;
          nativeSel.dispatchEvent(new Event('change', { bubbles: true }));
          lwSelectCloseAll();
          refreshLwSelect(nativeSel);
        });
        panel.appendChild(btn);
      });
      var picked = nativeSel.options[nativeSel.selectedIndex];
      labelEl.textContent = picked ? picked.textContent : '';
    }

    function initLwSelect(nativeSel) {
      if (!nativeSel) return;
      if (nativeSel._lwSelectWrap) {
        refreshLwSelect(nativeSel);
        return;
      }
      nativeSel.classList.add('lw-select-native');
      var wrap = document.createElement('div');
      wrap.className = 'lw-select';
      if (nativeSel.classList.contains('msg-bot-select')) wrap.classList.add('msg-bot-select');
      nativeSel.parentNode.insertBefore(wrap, nativeSel);
      wrap.appendChild(nativeSel);
      nativeSel._lwSelectWrap = wrap;

      var trigger = document.createElement('button');
      trigger.type = 'button';
      trigger.className = 'lw-select-trigger';
      trigger.setAttribute('aria-haspopup', 'listbox');
      trigger.setAttribute('aria-expanded', 'false');
      if (nativeSel.id) trigger.setAttribute('aria-controls', nativeSel.id + '-panel');
      trigger.innerHTML = '<span class="lw-select-label"></span><span class="lw-select-chevron" aria-hidden="true"></span>';
      wrap.appendChild(trigger);

      var panel = document.createElement('div');
      panel.className = 'lw-select-panel';
      panel.setAttribute('role', 'listbox');
      panel.hidden = true;
      if (nativeSel.id) panel.id = nativeSel.id + '-panel';
      wrap.appendChild(panel);

      wrap.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = wrap.classList.contains('is-open');
        lwSelectCloseAll();
        if (!open) {
          wrap.classList.add('is-open');
          trigger.setAttribute('aria-expanded', 'true');
          panel.hidden = false;
          var selected = panel.querySelector('.lw-select-option.is-selected');
          if (selected) selected.scrollIntoView({ block: 'nearest' });
        }
      });

      trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') lwSelectCloseAll();
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          trigger.click();
        }
      });

      nativeSel.addEventListener('change', function () {
        refreshLwSelect(nativeSel);
      });

      if (!nativeSel._lwSelectObserver) {
        nativeSel._lwSelectObserver = new MutationObserver(function () {
          refreshLwSelect(nativeSel);
        });
        nativeSel._lwSelectObserver.observe(nativeSel, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['value'],
        });
      }

      if (!_lwSelectDocBound) {
        _lwSelectDocBound = true;
        document.addEventListener('click', function () {
          lwSelectCloseAll();
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') lwSelectCloseAll();
        });
      }

      refreshLwSelect(nativeSel);
    }

    function initAllLwSelects() {
      document.querySelectorAll('select.log-select').forEach(initLwSelect);
    }

    async function logoutAdmin() {
      try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
      } catch (e) {}
      location.href = '/login.html';
    }

    (async function initAuthUi() {
      try {
        const res = await fetch('/api/auth/status', { credentials: 'same-origin' });
        const data = await res.json();
        const btn = document.getElementById('btn-logout');
        if (btn && data.auth_enabled) btn.style.display = '';
      } catch (e) {}
    })();

    function showView(name) {
      document.querySelectorAll('.view-panel').forEach((p) => p.classList.remove('is-active'));
      const panel = document.getElementById('view-' + name);
      if (panel) panel.classList.add('is-active');
      document.querySelectorAll('.nav-link').forEach((b) => b.classList.remove('is-active'));
      const nav = document.querySelector('.nav-link[data-nav="' + name + '"]');
      if (nav) nav.classList.add('is-active');
      setMainTitle(name);
      document.body.classList.remove('sidebar-open');
      if (name === 'logs') populateLogAccountSelectFromCache();
      if (name === 'plugins') loadPluginsPanel();
      if (name === 'messages') loadMessagesPanel(true);
    }

    async function fetchJson(url, options = {}) {
      options.credentials = options.credentials || 'same-origin';
      const res = await fetch(url, options);
      if (res.status === 401) {
        const next = encodeURIComponent(location.pathname + location.search);
        location.href = '/login.html?next=' + next;
        throw new Error('未登录');
      }
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      if (!res.ok) {
        const err = (data && data.error) || text || res.status;
        throw new Error(typeof err === 'string' ? err : JSON.stringify(err));
      }
      return data;
    }

    function esc(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function normalizeDeviceId(s) {
      return String(s || '').trim();
    }

    function deviceIdValidationError(did) {
      if (!did) return 'device_id 不能为空';
      return null;
    }

    function protoWs() {
      return location.protocol === 'https:' ? 'wss:' : 'ws:';
    }

    let _lastAccountsPayload = [];
    const _qrLoginUi = {};

    function rememberQrScanner(index, msg) {
      const state = _qrLoginUi[index] || (_qrLoginUi[index] = {});
      const nick = msg.nick_name || msg.nickname || msg.nickName;
      const avatar = msg.head_img_url || msg.avatar || msg.headImgUrl;
      if (nick) state.nickName = String(nick);
      if (avatar) state.headImgUrl = String(avatar);
      return state;
    }

    function qrScannerAvatarHtml(avatar) {
      if (!avatar) return '';
      return '<img class="qr-scanner-avatar" src="' + esc(avatar) + '" alt="" onerror="this.remove()" />';
    }

    function renderQrLoginStatus(index, phase, msg) {
      const st = document.getElementById('status-' + index);
      if (!st) return;
      const state = rememberQrScanner(index, msg || {});
      const nick = state.nickName || '';
      const avatar = state.headImgUrl || '';
      const map = {
        waiting: { cls: 'info', title: '', text: '请使用微信扫描二维码' },
        scanned: { cls: 'info', title: nick, text: '已扫码，请在手机上点【登录】' },
        confirming: { cls: 'info', title: nick, text: '正在确认登录…' },
        canceled: { cls: 'warn', title: nick, text: '已取消登录' },
        unknown: { cls: 'info', title: '', text: '状态更新' },
      };
      const spec = map[phase] || map.unknown;
      if (avatar || spec.title) {
        st.innerHTML =
          '<div class="qr-status-rich qr-status-rich--' + esc(phase) + '">' +
          qrScannerAvatarHtml(avatar) +
          '<div class="qr-status-rich-text">' +
          (spec.title ? '<strong>' + esc(spec.title) + '</strong>' : '') +
          '<span class="' + esc(spec.cls) + '">' + esc(spec.text) + '</span>' +
          '</div></div>';
        return;
      }
      st.innerHTML = '<span class="' + esc(spec.cls) + '">' + esc(spec.text) + '</span>';
    }

    function hideToast() {
      var el = document.getElementById('toast');
      if (!el) return;
      el.classList.remove('is-visible');
      el.setAttribute('aria-hidden', 'true');
      clearTimeout(window._lwapiToastTimer);
    }

    function clearModalFormError() {
      var el = document.getElementById('modal-edit-error');
      if (!el) return;
      el.hidden = true;
      el.textContent = '';
    }

    function showModalFormError(msg) {
      var el = document.getElementById('modal-edit-error');
      if (!el) {
        showToast(msg, 'warning');
        return;
      }
      if (!msg) {
        clearModalFormError();
        return;
      }
      el.hidden = false;
      el.textContent = msg;
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function showToast(msg, variant) {
      if (variant === true) variant = 'warning';
      if (variant === false) variant = 'success';
      variant = variant || 'success';
      var el = document.getElementById('toast');
      if (!el) return;
      var iconHtml = {
        success:
          '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M20 6L9 17l-5-5"/></svg>',
        error:
          '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>',
        warning:
          '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v5M12 17h.01"/><path d="M10.3 3.2h3.4L21 18H3L10.3 3.2z"/></svg>',
      };
      el.className = 'toast toast--' + variant;
      el.innerHTML =
        '<span class="toast-icon" aria-hidden="true">' +
        (iconHtml[variant] || iconHtml.success) +
        '</span>' +
        '<span class="toast-msg"></span>' +
        '<button type="button" class="toast-close" aria-label="关闭提示">×</button>';
      var span = el.querySelector('.toast-msg');
      if (span) span.textContent = msg;
      var closeBtn = el.querySelector('.toast-close');
      if (closeBtn) closeBtn.onclick = function (ev) {
        ev.stopPropagation();
        hideToast();
      };
      el.onclick = hideToast;
      el.classList.add('is-visible');
      el.setAttribute('aria-hidden', 'false');
      if (variant === 'error') el.setAttribute('role', 'alert');
      else el.setAttribute('role', 'status');
      clearTimeout(window._lwapiToastTimer);
      var ms = variant === 'error' ? 5200 : variant === 'warning' ? 3600 : 2800;
      window._lwapiToastTimer = setTimeout(hideToast, ms);
    }

    function notifyError(err, fallback) {
      var msg = (err && err.message) ? err.message : (fallback || '操作失败');
      showToast(msg, 'error');
    }

    function ensureAccountWs(index) {
      if (accountWs[index] && accountWs[index].readyState === WebSocket.OPEN) return Promise.resolve();
      return new Promise((resolve, reject) => {
        let settled = false;
        const fail = (err) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          reject(err instanceof Error ? err : new Error(String(err || '事件通道连接失败')));
        };
        const timer = setTimeout(function () {
          fail(new Error('事件通道连接超时，请刷新页面后重试'));
        }, 12000);
        try {
          const ws = new WebSocket(protoWs() + '//' + location.host + '/ws/account/' + index);
          accountWs[index] = ws;
          ws.onopen = function () {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            resolve();
          };
          ws.onerror = function () {
            fail(new Error('事件通道连接失败，请确认运维台已启动后重试'));
          };
          ws.onmessage = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              onAccountEvent(index, msg);
            } catch (e) { console.warn(e); }
          };
          ws.onclose = function () {
            if (accountWs[index] === ws) delete accountWs[index];
            if (!settled) {
              fail(new Error('事件通道连接失败，请刷新页面后重试'));
            } else {
              refreshAccounts({ soft: true });
            }
          };
        } catch (e) { fail(e); }
      });
    }

    function onAccountEvent(index, msg) {
      const st = document.getElementById('status-' + index);
      const panel = document.getElementById('qr-panel-' + index);
      const ev = msg.event;
      if (ev === 'sec_auto_ok') {
        if (st) st.innerHTML = '<span class="ok">' + esc(msg.message || '缓存登录成功') + '</span>';
        return;
      }
      if (ev === 'qr_ready') {
        delete _qrLoginUi[index];
        const qrImage = (msg.qr_image || '').trim();
        const b64 = (msg.qr_base64 || '').replace(/\s/g, '');
        if (panel) {
          var imgSrc = qrImage || (b64 ? 'data:image/png;base64,' + b64 : '');
          panel.innerHTML =
            '<div class="acc-qr-placeholder">' +
            '<div class="acc-qr-frame"><img class="qr" alt="微信登录二维码" src="' + imgSrc + '" onerror="this.style.display=\'none\'" /></div>' +
            '</div>';
        }
        renderQrLoginStatus(index, 'waiting', msg);
        return;
      }
      if (ev === 'poll') {
        return;
      }
      if (ev === 'status') {
        if (msg.phase === 'canceled') {
          const nick = String(msg.nick_name || msg.nickname || '').trim();
          clearAccountQrUi(index);
          setAccountExpanded(index, false);
          showToast(nick ? nick + ' 已取消登录' : '扫码已取消', 'warning');
          refreshAccounts({ soft: true });
          return;
        }
        renderQrLoginStatus(index, msg.phase || 'unknown', msg);
        if (msg.nick_name || msg.head_img_url || msg.nickname || msg.avatar) {
          refreshAccounts({ soft: true });
        }
        return;
      }
      if (ev === 'verify_url') {
        if (st) st.innerHTML = '<span class="err">安全验证：<a href="' + esc(msg.url) + '" target="_blank" rel="noopener">打开链接</a></span>';
        return;
      }
      if (ev === 'warning') {
        if (st) st.textContent = '网络波动：' + (msg.message || '');
        return;
      }
      if (ev === 'success') {
        if (st) st.innerHTML = '<span class="ok">登录成功 wxid=' + esc(msg.wxid) + '，正在写入配置…</span>';
        return;
      }
      if (ev === 'login_saved') {
        if (st) st.innerHTML = '<span class="ok">已保存 wxid：' + esc(msg.wxid) + '</span>';
        refreshAccounts({ soft: true });
        return;
      }
      if (ev === 'bot_online') {
        if (st) st.innerHTML = '<span class="ok">' + esc(msg.message || '机器人已在线') + '</span>';
        refreshAccounts({ soft: true });
        return;
      }
      if (ev === 'bot_stopped') {
        if (st) st.innerHTML = '<span class="err">' + esc(msg.message || '账号已停止') + '</span>';
        refreshAccounts({ soft: true });
        return;
      }
      if (ev === 'login_interrupted') {
        if (msg.code === 'canceled') {
          clearAccountQrUi(index);
          setAccountExpanded(index, false);
          refreshAccounts({ soft: true });
          return;
        }
        const state = _qrLoginUi[index] || {};
        const nick = state.nickName || '';
        const hint = {
          expired: '二维码已过期，正在刷新…',
          timeout: '扫码超时，正在刷新…',
          stopped: '登录已停止',
        };
        if (st) {
          const text = hint[msg.code] || msg.message || '登录中断，将重试';
          if (state.headImgUrl) {
            st.innerHTML =
              '<div class="qr-status-rich qr-status-rich--interrupted">' +
              qrScannerAvatarHtml(state.headImgUrl) +
              '<div class="qr-status-rich-text"><span class="info">' + esc(text) + '</span></div></div>';
          } else {
            st.innerHTML = '<span class="info">' + esc(text) + '</span>';
          }
        }
        return;
      }
      if (ev === 'bot_error') {
        if (st) st.innerHTML = '<span class="err">' + esc(msg.message || '运行错误') + '</span>';
        return;
      }
      if (ev === 'error') {
        if (msg.code === 'canceled') {
          clearAccountQrUi(index);
          setAccountExpanded(index, false);
          refreshAccounts({ soft: true });
          return;
        }
        if (st) st.innerHTML = '<span class="err">' + esc(msg.message || msg.code || '错误') + '</span>';
        refreshAccounts({ soft: true });
      }
    }

    function wxidConflictMessage(wxid, otherRemark) {
      var label = (otherRemark || '').trim() || String(wxid || '').slice(0, 12) || '未备注';
      return 'wxid 已存在（' + wxid + '，备注「' + label + '」），同一微信号只能添加一条';
    }

    function findDuplicateWxidIndex(wxid, excludeIndex) {
      var needle = String(wxid || '').trim();
      if (!needle || !_lastAccountsPayload) return -1;
      for (var i = 0; i < _lastAccountsPayload.length; i++) {
        if (excludeIndex != null && i === excludeIndex) continue;
        var w = String((_lastAccountsPayload[i] && _lastAccountsPayload[i].wxid) || '').trim();
        if (w === needle) return i;
      }
      return -1;
    }

    function isModalAddMode() {
      return document.getElementById('modal-edit-index').value === '';
    }

    function clearModalLoginModeSelection() {
      document.querySelectorAll('input[name="modal-login-mode"]').forEach(function (r) {
        r.checked = false;
      });
    }

    function onModalLoginModeChange() {
      clearModalFormError();
      updateModalLoginModePanels();
    }

    function updateModalLoginModePanels() {
      var mode = getModalLoginMode();
      var isAdd = isModalAddMode();
      var manual = document.getElementById('modal-edit-manual-fields');
      var deviceInput = document.getElementById('modal-edit-device');
      if (isAdd && !mode) {
        if (manual) manual.hidden = true;
        if (deviceInput) deviceInput.required = false;
        return;
      }
      if (manual) manual.hidden = false;
      if (deviceInput) deviceInput.required = !!mode;
    }

    function setModalLoginMode(mode) {
      var val = 'remote';
      if (mode === 'local' || mode === 'remote') val = mode;
      else if (mode === 'relay') val = 'local';
      var el = document.querySelector('input[name="modal-login-mode"][value="' + val + '"]');
      if (el) el.checked = true;
      updateModalLoginModePanels();
    }

    function getModalLoginMode() {
      var checked = document.querySelector('input[name="modal-login-mode"]:checked');
      return checked ? checked.value : '';
    }

    function badgeHtml(acc) {
      if (acc.pending_login) return '<span class="badge badge-wait">登录中</span>';
      if (acc.running) return '<span class="badge badge-on">运行中</span>';
      return '<span class="badge badge-off">未运行</span>';
    }

    function accountCardStateClass(acc) {
      if (acc.pending_login) return 'account-card--pending';
      if (acc.running) return 'account-card--running';
      return 'account-card--idle';
    }

    function accountAvatarPlaceholderHtml() {
      return '<span class="acc-avatar-placeholder" aria-hidden="true">' +
        '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">' +
        '<path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>' +
        '</svg></span>';
    }

    function accountAvatarHtml(acc) {
      const url = (acc.avatar_url || '').trim();
      const img = url
        ? '<img class="acc-avatar-img" src="' + esc(url) + '" alt="" onerror="this.remove()" />'
        : '';
      return '<div class="acc-avatar" aria-hidden="true">' + img + accountAvatarPlaceholderHtml() + '</div>';
    }

    function accountTitleHtml(acc) {
      const remark = esc(acc.remark || '(未备注)');
      const nick = (acc.nickname || '').trim();
      if (!nick || nick === (acc.remark || '').trim()) return remark;
      return remark + ' <span class="acc-nickname">' + esc(nick) + '</span>';
    }

    function accountMetaHtml(acc) {
      var wx = acc.wxid || '';
      return '<span class="acc-wxid" title="' + esc(wx) + '">' + esc(wx || '—') + '</span>';
    }

    function accountStartLabel(acc) {
      return '启动';
    }

    function accountStartBtnHtml(acc, index) {
      const running = acc.running;
      const pending = acc.pending_login;
      const disabled = running || pending;
      return '<button type="button" class="btn btn-primary acc-btn-start" data-start="' + index + '"' +
        (disabled ? ' disabled' : '') + ' onclick="accountStart(' + index + ')">' +
        esc(accountStartLabel(acc)) + '</button>';
    }

    function accountStopDisabled(acc) {
      return !acc.running && !acc.pending_login;
    }

    async function accountStart(index) {
      await startBot(index);
    }

    function patchAccountCardDom(card, acc, index) {
      card.classList.remove('account-card--idle', 'account-card--running', 'account-card--pending');
      card.classList.add(accountCardStateClass(acc));
      const avatarSlot = card.querySelector('.acc-avatar');
      if (avatarSlot) avatarSlot.outerHTML = accountAvatarHtml(acc);
      const titleEl = card.querySelector('.acc-title');
      if (titleEl) titleEl.innerHTML = accountTitleHtml(acc);
      const badgeSlot = card.querySelector('.acc-badges');
      if (badgeSlot) badgeSlot.innerHTML = badgeHtml(acc);
      const metaSlot = card.querySelector('.acc-row-meta');
      if (metaSlot) metaSlot.innerHTML = accountMetaHtml(acc);
      if (!acc.pending_login && !acc.running) {
        clearAccountQrUi(index);
      }
      setAccountExpanded(index, !!acc.pending_login);
      const running = acc.running;
      const pending = acc.pending_login;
      const disableStart = running || pending;
      const disableMutate = running || pending;
      const startBtn = card.querySelector('.acc-btn-start');
      const stopBtn = card.querySelector('.acc-btn-stop');
      const editBtn = card.querySelector('.acc-btn-edit');
      const delBtn = card.querySelector('.acc-btn-del');
      if (startBtn) {
        startBtn.hidden = false;
        startBtn.disabled = disableStart;
        startBtn.textContent = accountStartLabel(acc);
      }
      if (stopBtn) {
        stopBtn.hidden = false;
        stopBtn.disabled = accountStopDisabled(acc);
      }
      if (editBtn) editBtn.disabled = disableMutate;
      if (delBtn) delBtn.disabled = disableMutate;
    }

    function softPatchAccounts(data) {
      const cards = document.querySelectorAll('.account-card[data-idx]');
      if (cards.length !== data.accounts.length) return false;

      data.accounts.forEach((acc, index) => {
        const card = document.querySelector('.account-card[data-idx="' + index + '"]');
        if (!card) return;
        patchAccountCardDom(card, acc, index);
      });
      return true;
    }

    function setAccountExpanded(index, exp) {
      const card = document.querySelector('.account-card[data-idx="' + index + '"]');
      if (!card) return;
      const cur = card.classList.contains('is-expanded');
      if (cur === !!exp) return;
      card.classList.toggle('is-expanded', !!exp);
      const wrap = card.querySelector('.acc-row-detail-wrap');
      if (wrap) wrap.setAttribute('aria-hidden', exp ? 'false' : 'true');
    }

    function buildAccountRow(acc, index) {
      const running = acc.running;
      const pending = acc.pending_login;
      const disableMutate = running || pending;
      const badge = badgeHtml(acc);
      const stateCls = accountCardStateClass(acc);
      const isExpanded = !!pending;
      const expCls = isExpanded ? ' is-expanded' : '';
      const ariaHid = isExpanded ? 'false' : 'true';
      const startBtnHtml = accountStartBtnHtml(acc, index);
      const stopBtnHtml = '<button type="button" class="btn btn-ghost acc-btn-stop" data-stop="' + index + '" onclick="stopBot(' + index + ')"' +
        (accountStopDisabled(acc) ? ' disabled' : '') + '>停止</button>';

      return (
        '<div class="account-card ' + stateCls + expCls + '" data-idx="' + index + '">' +
        '<div class="acc-row">' +
        accountAvatarHtml(acc) +
        '<div class="acc-row-head">' +
        '<h3 class="acc-title">' + accountTitleHtml(acc) + '</h3>' +
        '<div class="acc-badges">' + badge + '</div>' +
        '</div>' +
        '<div class="acc-row-meta">' +
        accountMetaHtml(acc) +
        '</div>' +
        '<div class="actions acc-actions">' +
        startBtnHtml +
        stopBtnHtml +
        '<button type="button" class="btn btn-ghost acc-btn-edit" data-edit="' + index + '" onclick="editAccount(' + index + ')"' +
        (disableMutate ? ' disabled' : '') + '>编辑</button>' +
        '<button type="button" class="btn btn-danger acc-btn-del" data-del="' + index + '" onclick="deleteAccount(' + index + ')"' +
        (disableMutate ? ' disabled' : '') + '>删除</button>' +
        '</div>' +
        '</div>' +
        '<div class="acc-row-detail-wrap" id="acc-detail-' + index + '" aria-hidden="' + ariaHid + '">' +
        '<div class="acc-row-detail">' +
        '<div class="acc-row-detail-inner">' +
        '<div class="acc-qr-shell">' +
        '<p class="acc-qr-hint" id="qr-hint-' + index + '">启动后，二维码与登录状态将显示在此</p>' +
        '<div class="acc-qr-panel" id="qr-panel-' + index + '"></div>' +
        '<div class="status-line acc-status" id="status-' + index + '"></div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>'
      );
    }

    async function refreshAccounts(opts) {
      opts = opts || {};
      const soft = opts.soft === true;
      const data = await fetchJson('/api/accounts');
      _lastAccountsPayload = data.accounts;
      const host = document.getElementById('accounts');
      if (soft && host.querySelector('.account-card')) {
        if (softPatchAccounts(data)) {
          populateLogAccountSelect(data.accounts);
          return;
        }
      }
      const qrSnap = snapshotPendingQrPanels(data.accounts);
      host.innerHTML = data.accounts.map((acc, index) => buildAccountRow(acc, index)).join('');
      restorePendingQrPanels(qrSnap);
      populateLogAccountSelect(data.accounts);
    }

    function populateLogAccountSelect(accounts) {
      const sel = document.getElementById('log-account-select');
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = accounts
        .map((a, i) => {
          const label = (a.remark || '').trim() || (a.device_id || '').slice(0, 12) || '账号' + i;
          return '<option value="' + i + '">' + esc(label) + '</option>';
        })
        .join('');
      if (prev !== '' && sel.querySelector('option[value="' + prev + '"]')) sel.value = prev;
    }

    function populateLogAccountSelectFromCache() {
      if (_lastAccountsPayload && _lastAccountsPayload.length) populateLogAccountSelect(_lastAccountsPayload);
    }

    async function loadLogForSelected() {
      const sel = document.getElementById('log-account-select');
      const pre = document.getElementById('log-page-pre');
      if (!sel || !pre) return;
      const idx = sel.value;
      if (idx === '' || idx == null) {
        pre.textContent = '暂无账号。';
        return;
      }
      pre.textContent = '加载中…';
      try {
        const data = await fetchJson('/api/accounts/' + idx + '/log?lines=50');
        if (!data.exists) {
          pre.textContent = (data.message || '无日志文件') + '\n' + (data.path || '');
          return;
        }
        pre.textContent = (data.lines || []).join('\n');
      } catch (e) {
        pre.textContent = e.message;
      }
    }

    async function startBot(index) {
      setAccountExpanded(index, true);
      const st = document.getElementById('status-' + index);
      if (st) st.innerHTML = '<span class="info">正在连接事件通道并启动…</span>';
      try {
        await ensureAccountWs(index);
        await new Promise((r) => setTimeout(r, 80));
        await fetchJson('/api/accounts/' + index + '/start', { method: 'POST' });
        await refreshAccounts({ soft: true });
      } catch (e) {
        notifyError(e);
        if (st) st.innerHTML = '<span class="err">' + esc(e.message) + '</span>';
        await refreshAccounts({ soft: false });
      }
    }

    /** 停止后清空右侧扫码区（二维码、UUID、链接、状态），恢复占位提示。 */
    function clearAccountQrUi(index) {
      const panel = document.getElementById('qr-panel-' + index);
      const st = document.getElementById('status-' + index);
      if (panel) panel.innerHTML = '';
      if (st) st.innerHTML = '';
      delete _qrLoginUi[index];
    }

    function snapshotPendingQrPanels(accounts) {
      const snap = {};
      (accounts || []).forEach((acc, index) => {
        if (!acc.pending_login) return;
        const panel = document.getElementById('qr-panel-' + index);
        const st = document.getElementById('status-' + index);
        snap[index] = {
          panelHtml: panel ? panel.innerHTML : '',
          statusHtml: st ? st.innerHTML : '',
          ui: _qrLoginUi[index] ? Object.assign({}, _qrLoginUi[index]) : undefined,

    function isLwSendBizSuccess(result) {
      if (!result || typeof result !== 'object') return false;
      if (Number(result.code) === 200) return true;
      if (result.BaseResponse && Number(result.BaseResponse.ret) === 0) return true;
      if (Array.isArray(result.List) && result.List.length) {
        return result.List.every(function (x) {
          return x && Number(x.Ret) === 0;
        });
      }
      return false;
    }

    function lwSendBizErrorText(result) {
      if (!result || typeof result !== 'object') return '发送失败';
      if (result.BaseResponse) {
        var ret = Number(result.BaseResponse.ret);
        if (ret !== 0) {
          var em = result.BaseResponse.errMsg;
          if (em && typeof em === 'object' && em.string) return String(em.string);
          return '发送失败（BaseResponse.ret=' + ret + '）';
        }
      }
      if (Array.isArray(result.List) && result.List.length) {
        var bad = result.List.filter(function (x) {
          return x && Number(x.Ret) !== 0;
        });
        if (bad.length) {
          return '部分失败（Ret=' + bad[0].Ret + '）';
        }
      }
      if (result.message) return String(result.message);
      return '发送失败';
    }

        if (byId[id]) ordered.push(byId[id]);

    async function movePluginOrder(id, delta) {
      var host = document.getElementById('plugins-list');
      if (!host) return;
      var enabledCards = Array.prototype.slice.call(host.querySelectorAll('.plugin-card.is-enabled'));
      var i = enabledCards.findIndex(function (c) {
        return c.getAttribute('data-plugin-id') === id;
      });
      if (i < 0) return;
      var j = i + delta;
      if (j < 0 || j >= enabledCards.length) return;
      var a = enabledCards[i];
      var b = enabledCards[j];
      if (delta < 0) host.insertBefore(a, b);
      else host.insertBefore(b, a);
      refreshPluginOrderUi();
      try {
        await persistPlugins();
        showToast('已更新执行顺序');
      } catch (e) {
        notifyError(e);
      }
    }

      });
      var found = false;
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === prev) {
          found = true;
          break;
        }
      }
      if (found) sel.value = prev;
    }

    function fmtMsgTs(ts) {
      if (ts == null || ts === '') return '—';
      var n = Number(ts);
      if (!isFinite(n)) return '—';
      if (n < 1e12) n = n * 1000;
      var d = new Date(n);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleString();
    }

    function updateMsgComposePanel() {
      var panel = document.getElementById('msg-compose-panel');
      if (!panel) return;
      var ok = msgUi.filter === 'peer' && msgUi.peerWxid;
      panel.hidden = !ok;
      if (!ok) return;
      var pEl = document.getElementById('msg-compose-peer');
      var bEl = document.getElementById('msg-compose-bot');
      if (pEl) pEl.textContent = msgUi.peerWxid || '';
      if (bEl) bEl.textContent = msgUi.peerBot || msgBotQuery() || '（未指定）';
    }

    async function onMsgRowClick(i) {
      var r = window._msgListItems && window._msgListItems[i];
      if (!r) return;
      msgUi.filter = 'peer';
      msgUi.peerBot = r.bot_wxid;
      msgUi.peerWxid = r.peer_wxid;
      msgUi.msgType = null;
      msgUi.page = 0;
      highlightMsgNav();
      updateMsgComposePanel();
      await loadMessagesListRows();
    }

    async function runMsgSearch() {
      msgUi.page = 0;
      await loadMessagesListRows();
      highlightMsgNav();
    }

    async function clearMsgSearch() {
      var el = document.getElementById('msg-search-q');
      if (el) el.value = '';
      msgUi.page = 0;
      await loadMessagesListRows();
      highlightMsgNav();
    }

    async function sendMsgCompose() {
      var ta = document.getElementById('msg-compose-body');
      var text = ta && ta.value ? String(ta.value).trim() : '';
      if (!text) {
        showToast('请输入要发送的内容', 'warning');
        return;
      }
      var bot = (msgUi.peerBot || '').trim() || msgBotQuery();
      var to = (msgUi.peerWxid || '').trim();
      if (!bot || !to) {
        showToast('请先选择会话：左侧「按会话」或点击表格中一条消息', 'warning');
        return;
      }
      var btn = document.getElementById('msg-compose-send');
      if (btn) btn.disabled = true;
      try {
        var res = await fetchJson('/api/messages/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bot_wxid: bot, to_wxid: to, content: text }),
        });
        if (!isLwSendBizSuccess(res.result)) {
          showToast(lwSendBizErrorText(res.result), 'error');
          return;
        }
        showToast('消息已发送', 'success');
        if (ta) ta.value = '';
        await loadMessagesListRows();
      } catch (e) {
        showToast(e.message || '请求失败', 'error');
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function renderMsgAggregateNav(summ) {
      var byType = document.getElementById('msg-nav-by-type');
      var byPeer = document.getElementById('msg-nav-by-peer');
      if (!byType || !byPeer) return;
      window._msgNavTypes = summ.by_type || [];
      byType.innerHTML = window._msgNavTypes
        .map(function (t, i) {
          return (
            '<button type="button" class="msg-nav-item" data-kind="type" data-index="' +
            i +
            '" onclick="onPickMsgType(' +
            i +
            ')">' +
            esc(t.label) +
            ' <span class="msg-nav-count">' +
            t.count +
            '</span></button>'
          );
        })
        .join('');
      window._msgNavPeers = summ.by_peer || [];
      byPeer.innerHTML = window._msgNavPeers
        .map(function (p, i) {
          var pw = p.peer_wxid || '';
          var shortPeer = pw.length > 26 ? pw.slice(0, 24) + '…' : pw;
          var bw = p.bot_wxid || '';
          var shortBot = bw.length > 16 ? bw.slice(0, 14) + '…' : bw;
          return (
            '<button type="button" class="msg-nav-item msg-nav-peer" data-kind="peer" data-index="' +
            i +
            '" onclick="onPickMsgPeer(' +
            i +
            ')"><span class="msg-peer-line1">' +
            esc(shortPeer) +
            '</span><span class="msg-peer-meta">' +
            esc(shortBot) +
            ' · ' +
            p.count +
            '</span></button>'
          );
        })
        .join('');
    }

    function highlightMsgNav() {
      document.querySelectorAll('.msg-nav-item').forEach(function (b) {
        b.classList.remove('is-active');
      });
      if (msgUi.filter === 'all') {
        var a = document.querySelector('.msg-nav-item[data-filter="all"]');
        if (a) a.classList.add('is-active');
        return;
      }
      if (msgUi.filter === 'type' && msgUi.msgType != null) {
        (window._msgNavTypes || []).forEach(function (t, i) {
          if (t.msg_type === msgUi.msgType) {
            var b = document.querySelector('.msg-nav-item[data-kind="type"][data-index="' + i + '"]');
            if (b) b.classList.add('is-active');
          }
        });
        return;
      }
      if (msgUi.filter === 'peer' && msgUi.peerWxid) {
        (window._msgNavPeers || []).forEach(function (p, i) {
          if (p.peer_wxid === msgUi.peerWxid && p.bot_wxid === msgUi.peerBot) {
            var b = document.querySelector('.msg-nav-item[data-kind="peer"][data-index="' + i + '"]');
            if (b) b.classList.add('is-active');
          }
        });
      }
    }

    async function selectMsgFilterAll() {
      msgUi.filter = 'all';
      msgUi.msgType = null;
      msgUi.peerBot = null;
      msgUi.peerWxid = null;
      msgUi.page = 0;
      await loadMessagesPanel(true);
    }

    async function onPickMsgType(idx) {
      var t = (window._msgNavTypes || [])[idx];
      if (!t) return;
      msgUi.filter = 'type';
      msgUi.msgType = t.msg_type;
      msgUi.peerBot = null;
      msgUi.peerWxid = null;
      msgUi.page = 0;
      highlightMsgNav();
      updateMsgComposePanel();
      await loadMessagesListRows();
    }

    async function onPickMsgPeer(idx) {
      var p = (window._msgNavPeers || [])[idx];
      if (!p) return;
      msgUi.filter = 'peer';
      msgUi.msgType = null;
      msgUi.peerBot = p.bot_wxid;
      msgUi.peerWxid = p.peer_wxid;
      msgUi.page = 0;
      highlightMsgNav();
      updateMsgComposePanel();
      await loadMessagesListRows();
    }

    function onMsgBotFilterChange() {
      msgUi.page = 0;
      msgUi.filter = 'all';
      msgUi.msgType = null;
      msgUi.peerBot = null;
      msgUi.peerWxid = null;
      loadMessagesPanel(true);
    }

    async function loadMessagesListRows() {
      var params = new URLSearchParams();
      var dropBot = msgBotQuery();
      if (dropBot) params.set('bot_wxid', dropBot);
      if (msgUi.filter === 'type' && msgUi.msgType != null) params.set('msg_type', String(msgUi.msgType));
      if (msgUi.filter === 'peer' && msgUi.peerWxid) {
        params.set('peer_wxid', msgUi.peerWxid);
        if (msgUi.peerBot) params.set('bot_wxid', msgUi.peerBot);
      }
      var qInput = document.getElementById('msg-search-q');
      var qRaw = qInput && qInput.value ? String(qInput.value).trim() : '';
      if (qRaw) params.set('q', qRaw);
      params.set('limit', String(MSG_PAGE_SIZE));
      params.set('offset', String(msgUi.page * MSG_PAGE_SIZE));
      var data = await fetchJson('/api/messages?' + params.toString());
      var meta = document.getElementById('msg-list-meta');
      var total = data.total != null ? data.total : 0;
      if (meta) {
        var base =
          '共 ' +
          total +
          ' 条 · 第 ' +
          (msgUi.page + 1) +
          ' 页 · 每页 ' +
          MSG_PAGE_SIZE;
        if (qRaw) base += ' · 关键词「' + qRaw + '」';
        meta.textContent = base;
      }
      var tb = document.getElementById('msg-table-body');
      if (tb) {
        var rows = data.items || [];
        window._msgListItems = rows;
        if (!rows.length) {
          tb.innerHTML =
            '<tr><td colspan="5" class="msg-empty">暂无记录（机器人收到消息后才会入库）。</td></tr>';
        } else {
          tb.innerHTML = rows
            .map(function (r, i) {
              return (
                '<tr class="msg-row-click" role="button" tabindex="0" onclick="onMsgRowClick(' +
                i +
                ')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();onMsgRowClick(' +
                i +
                ');}">' +
                '<td class="msg-td-time">' +
                esc(fmtMsgTs(r.received_at)) +
                '</td>' +
                '<td class="msg-td-mono">' +
                esc(r.bot_wxid || '') +
                '</td>' +
                '<td class="msg-td-mono">' +
                esc(r.peer_wxid || '') +
                '</td>' +
                '<td>' +
                esc(r.category || '') +
                '</td>' +
                '<td class="msg-td-content">' +
                esc(r.content || '') +
                '</td>' +
                '</tr>'
              );
            })
            .join('');
        }
      }
      var prev = document.getElementById('msg-page-prev');
      var next = document.getElementById('msg-page-next');
      var lastPage = total <= 0 ? 0 : Math.floor((total - 1) / MSG_PAGE_SIZE);
      if (prev) prev.disabled = msgUi.page <= 0;
      if (next) next.disabled = msgUi.page >= lastPage;
    }

    async function loadMessagesPanel(reloadNav) {
      var doNav = reloadNav !== false;
      try {
        await populateMsgBotOptions();
        var botQ = msgBotQuery();
        var qSumm = botQ ? '?bot_wxid=' + encodeURIComponent(botQ) : '';
        var summ = await fetchJson('/api/messages/summary' + qSumm);
        var hint = document.getElementById('msg-sync-hint');
        if (hint) {
          var m = summ.msg_sync_mode === 'websocket' ? 'WebSocket' : 'HTTP 长轮询';
          hint.innerHTML =
            '当前同步方式：<strong>' +
            esc(m) +
            '</strong>。入库：<code>config/messages.sqlite</code>。';
        }
        if (doNav) {
          renderMsgAggregateNav(summ);
          highlightMsgNav();
        }
        await loadMessagesListRows();
        updateMsgComposePanel();
      } catch (e) {
        notifyError(e);
      }
    }

    async function msgPageDelta(d) {
      msgUi.page = Math.max(0, msgUi.page + d);
      await loadMessagesListRows();
      highlightMsgNav();
    }

    initAllLwSelects();
    refreshAccounts({ soft: false });
    setInterval(function () { refreshAccounts({ soft: true }); }, 4000);
  </script>
</body>
</html>
